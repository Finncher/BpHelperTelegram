<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP Helper v6 - Telegram Web App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎯 BP Helper v6</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value" id="today-bp">0</span>
                    <span class="stat-label">BP today</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="total-bp">0</span>
                    <span class="stat-label">Total BP</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="completed-count">0</span>
                    <span class="stat-label">Tasks ✓</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Navigation Tabs -->
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="solo">👤 Solo</button>
                <button class="nav-tab" data-tab="pair">👥 Pair</button>
                <button class="nav-tab" data-tab="faction">🏰 Faction</button>
            </nav>

            <!-- Task Lists -->
            <div class="task-section" id="solo-section">
                <h3>Solo Tasks</h3>
                <div class="task-list" id="solo-tasks"></div>
            </div>

            <div class="task-section hidden" id="pair-section">
                <h3>Pair Tasks</h3>
                <div class="task-list" id="pair-tasks"></div>
            </div>

            <div class="task-section hidden" id="faction-section">
                <h3>Faction Tasks</h3>
                <div class="task-list" id="faction-tasks"></div>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-controls">
            <button class="btn btn-secondary" id="reset-btn">🔄 Сброс</button>
            <button class="btn btn-primary" id="end-day-btn">🌙 Завершить день</button>
        </div>

        <!-- Timer Overlay -->
        <div class="timer-overlay" id="timer-overlay">
            <div class="timer-content">
                <h3 id="timer-name">Таймер</h3>
                <div class="timer-display" id="timer-display">00:00</div>
                <button class="btn btn-success" id="timer-start">▶ Старт</button>
                <button class="btn btn-danger" id="timer-stop">⏹ Стоп</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
